name: CD Pipeline
on:
  push:
    branches: [ "main" ]

jobs:
  publish-image:
    name: Publikacja obrazu w GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Budowanie i wypychanie obrazu
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: final
          push: true
          tags: ghcr.io/${{ github.repository }}/moja-aplikacja:latest