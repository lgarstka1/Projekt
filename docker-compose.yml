version: '3.8'

networks:
  front_net: 
  back_net:  

volumes:
  db_data:
  nginx_logs:
  seed_output:

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - back_net


  app:
    build: 
      context: .
      dockerfile: Dockerfile
      target: final
    depends_on:
      - db
    networks:
      - front_net
      - back_net


  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - front_net


  seed_runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder 
    command: ["python", "app/seed/run_seed.py"]
    restart: "no"
    depends_on:
      - db
    volumes:
      - seed_output:/app/seed_output
    networks:
      - back_net